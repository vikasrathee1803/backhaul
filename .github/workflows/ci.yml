name: CI

# Gate both runtimes on every push and pull request.
# The live-API / Braintrust eval runs only on main.
on:
  push:
    branches:
      - main
      - "**"
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # apps/web — Next.js frontend + BFF (TypeScript)
  # ---------------------------------------------------------------------------
  web:
    name: web (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  # ---------------------------------------------------------------------------
  # apps/agent — FastAPI + LangGraph (Python). Fixture-based evals run here.
  # No live Anthropic API call: SKIP_LIVE_TESTS=1 makes the harness skip them.
  # ---------------------------------------------------------------------------
  agent:
    name: agent (Python 3.11)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    env:
      SKIP_LIVE_TESTS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Type check
        run: mypy .

      - name: Lint
        run: ruff check .

      - name: Test (fixture-based, no live API)
        run: pytest

  # ---------------------------------------------------------------------------
  # eval — Braintrust-backed golden suite. main only; gated on web + agent.
  # This is the one job allowed to consume the live API budget and secrets.
  # ---------------------------------------------------------------------------
  eval:
    name: eval (Braintrust, main only)
    runs-on: ubuntu-latest
    needs: [web, agent]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: apps/agent
    env:
      BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Braintrust eval suite
        run: pytest evals/
